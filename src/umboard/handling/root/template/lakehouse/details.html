{{! Lakehouse Details Fragment }}
<div class="mx-auto max-w-7xl">
  <div class="mb-8 flex items-start justify-between gap-6">
    <div>
      <div class="breadcrumbs text-sm">
        <ul>
          <li><a hx-get="/umboard/root/lakehouse/list" hx-target="#main-content" hx-swap="innerHTML">Lakehouse</a></li>
          <li>{{schema_name}}</li>
          <li>{{table_name}}</li>
        </ul>
      </div>
    </div>
    <div class="text-right">
      <span class="mt-2 opacity-60">{{schema_name}}</span>
      <span class="text-xl font-bold">{{table_name}}</span>
    </div>
  </div>

  <div class="overflow-x-auto rounded-lg bg-base-100 shadow">
    <table class="table table-zebra">
      <thead>
        <tr>
          {{#columns}}
          <th class="font-mono">{{name}}</th>
          {{/columns}}
        </tr>
      </thead>
      <tbody>
        {{#rows}}
        <tr>
          {{#cells}}
          <td class="max-w-96 truncate font-mono text-xs">{{value}}</td>
          {{/cells}}
        </tr>
        {{/rows}}
      </tbody>
    </table>
  </div>

  {{^rows}}
  <div class="mt-4 rounded-lg bg-base-100 p-8 text-center shadow">
    <div class="text-lg font-semibold">No rows found</div>
  </div>
  {{/rows}}
</div>
